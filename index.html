<head>

<title>Flux3tor</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<body>

<a href="https://hackclub.com/" target="_blank">

    <span id="time"></span>
    <span>India</span>
  </div>

  <div class="links">
    <a class="linkBtn" href="https://github.com/Flux3tor" target="_blank">GitHub</a>
    <a class="linkBtn" href="https://instagram.com/flux3tor" target="_blank">Instagram</a>
    <span class="linkBtn" id="copyEmailBtn">me@flux3tor.xyz</span>

    <img title="VSCode" src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/vscode/vscode-original.svg">
    <img title="Arduino" src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/arduino/arduino-original.svg">
  </div>

  <h3 class="sectionTitle">Projects</h3>
  <div id="projectsDiv" class="projects"></div>

</main>

<div class="credits">© <span id="year"></span> flux3tor</div>
<div id="toast"></div>

<script src="script.js"></script>
